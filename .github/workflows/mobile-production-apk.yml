name: Mobile Production APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Perfil de EAS para construir"
        required: true
        default: "production-apk"
        type: choice
        options:
          - production-apk
      artifactName:
        description: "Nombre base del APK generado"
        required: true
        default: "mochi-production"
        type: string

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-production-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 📦 Get pnpm cache directory
        id: pnpm-cache-dir
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        working-directory: .

      - name: 📦 Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: 🧪 TypeScript check (mobile)
        run: pnpm --filter mochi-mobile exec tsc --noEmit
        working-directory: .

      - name: 🔄 Verify EAS CLI
        run: pnpm dlx eas-cli@latest --version

      - name: 📱 Build Production APK (EAS local)
        run: |
          pnpm dlx eas-cli@latest build \
            --platform android \
            --profile "${{ github.event.inputs.profile }}" \
            --local \
            --non-interactive \
            --output "./${{ github.event.inputs.artifactName }}.apk"

      - name: 🏷️ Generate build info
        id: build-info
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          if git describe --tags --abbrev=0 > /dev/null 2>&1; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            git log "$LAST_TAG"..HEAD --pretty=format:"- %s" > changelog.md
          else
            git log --pretty=format:"- %s" -n 20 > changelog.md
          fi

      - name: 📝 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "production-apk-v${{ steps.build-info.outputs.version }}-${{ steps.build-info.outputs.build_number }}"
          tag_name: "production-apk-v${{ steps.build-info.outputs.version }}-${{ steps.build-info.outputs.build_number }}"
          files: apps/mobile/${{ github.event.inputs.artifactName }}.apk
          body_path: apps/mobile/changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}